environment:
  name: development
  blocked_tools:
    - send_email
    - billing_payout
    - database_wipe

roles:
  user:
    allowed_tools:
      - get_youtube_transcript
      - clarify_summarization_goal
      - classify_video
      - search_knowledge_base
      - generate_structured_notes
  admin:
    allowed_tools:
      - get_youtube_transcript
      - clarify_summarization_goal
      - classify_video
      - search_knowledge_base
      - generate_structured_notes
      - sync_notes_to_notion
      - deduplicate_notes
